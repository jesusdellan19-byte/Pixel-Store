<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP STORE</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
}

/* HEADER */
header {
  background: black;
  text-align: center;
  padding: 20px;
  font-size: 26px;
  color: gold;
  font-weight: bold;
}

/* SECCIONES */
.container {
  padding: 15px;
}

.section {
  background: #151515;
  margin-bottom: 15px;
  border-radius: 12px;
  overflow: hidden;
  transition: 0.3s;
}

.section-header {
  padding: 15px;
  font-size: 18px;
  color: gold;
  cursor: pointer;
}

.section-content {
  display: none;
  padding: 10px;
  animation: fadeIn 0.5s ease;
}

/* CARDS */
.card {
  background: #1d1d1d;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.price {
  color: gold;
  margin: 5px 0;
}

.buttons {
  display: flex;
  gap: 8px;
}

.btn {
  flex: 1;
  text-align: center;
  padding: 8px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 13px;
}

.buy {
  background: gold;
  color: black;
}

.info {
  background: #333;
  color: white;
}

/* ANIMACIÓN */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* BOTÓN WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  font-size: 20px;
  color: white;
}
</style>

</head>

<body>

<header>VIP STORE</header>

<div class="container">

<!-- STREAMING -->
<div class="section">
<div class="section-header" onclick="toggleSection(this)">🎬 Streaming ▼</div>
<div class="section-content">

<div class="card">
Netflix
<div class="price">Desde $3</div>
<div class="buttons">
<a class="btn buy" href="https://wa.me/584249561560?text=Netflix">Comprar</a>
</div>
</div>

<div class="card">
Disney+
<div class="price">Desde $3</div>
<div class="buttons">
<a class="btn buy" href="https://wa.me/584249561560?text=Disney+">Comprar</a>
</div>
</div>

</div>
</div>

<!-- RECARGAS -->
<div class="section">
<div class="section-header" onclick="toggleSection(this)">🎮 Recargas ▼</div>
<div class="section-content">

<div class="card">
Free Fire
<div class="price">Diamantes desde $1</div>
<div class="buttons">
<a class="btn buy" href="https://wa.me/584249561560?text=Free Fire">Comprar</a>
</div>
</div>

<div class="card">
Call of Duty
<div class="price">CP desde $2</div>
<div class="buttons">
<a class="btn buy" href="https://wa.me/584249561560?text=COD">Comprar</a>
</div>
</div>

<div class="card">
Roblox
<div class="price">Robux desde $2</div>
<div class="buttons">
<a class="btn buy" href="https://wa.me/584249561560?text=Roblox">Comprar</a>
</div>
</div>

</div>
</div>

<!-- DISEÑO -->
<div class="section">
<div class="section-header" onclick="toggleSection(this)">🎨 Diseño ▼</div>
<div class="section-content">

<div class="card">
Flyers
<div class="price">Desde $5</div>
<div class="buttons">
<a class="btn buy" href="https://wa.me/584249561560?text=Flyer">Solicitar</a>
</div>
</div>

<div class="card">
Logos
<div class="price">Desde $10</div>
<div class="buttons">
<a class="btn buy" href="https://wa.me/584249561560?text=Logo">Solicitar</a>
</div>
</div>

</div>
</div>

</div>

<!-- BOTÓN FLOTANTE -->
<a class="whatsapp" href="https://wa.me/584249561560">💬</a>

<script>
function toggleSection(element) {
  let content = element.nextElementSibling;

  if (content.style.display === "block") {
    content.style.display = "none";
  } else {
    content.style.display = "block";
  }
}
</script>

</body>
  </html>
